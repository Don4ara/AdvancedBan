name: Release

# Publish on tag push, e.g. `git tag v2.3.0 && git push --tags`
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub Release + upload assets
  packages: write   # deploy to GitHub Packages

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 26
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Collect artifact
        run: |
          mkdir artifact
          mv bundle/target/Adv*.jar artifact/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish to GitHub Packages
        run: mvn deploy -s ${{ github.workspace }}/settings.xml -DskipTests
        env:
          GITHUB_TOKEN: ${{ github.token }}
