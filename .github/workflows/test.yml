name: Unit tests

on:
  pull_request:
    branches: [ master, development ]
  push:
    branches: [ master, development ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 26

      - name: Test with Maven
        run: mvn -B test --file pom.xml
